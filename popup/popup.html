<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laneway Bee</title>
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="../icons/honeycomb.png" alt="Laneway Bee" class="logo-icon">
        <h1>Laneway Bee</h1>
      </div>
      <div class="auth-status" id="auth-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="user-email">Not configured</span>
      </div>
    </div>

    <!-- Meeting Status -->
    <div class="meeting-status" id="meeting-status">
      <div class="status-card">
        <div class="status-icon" id="meeting-icon">📅</div>
        <div class="status-info">
          <div class="status-label">Meeting Status</div>
          <div class="status-value" id="meeting-status-text">No active meeting</div>
          <div class="meeting-title" id="meeting-title"></div>
          <div class="tracking-badge" id="tracking-badge" style="display: none;"></div>
        </div>
      </div>
    </div>

    <!-- Recording Controls -->
    <div class="recording-section" id="recording-section">
      <div class="recording-status" id="recording-status">
        <div class="recording-indicator">
          <span class="recording-dot" id="recording-dot"></span>
          <span id="recording-text">Not Recording</span>
        </div>
        <div class="recording-time" id="recording-time">00:00:00</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="record-btn">
          <span class="btn-icon">⏺</span>
          <span class="btn-text">Start Recording</span>
        </button>
      </div>

      <!-- Quality Settings -->
      <div class="settings-group">
        <label for="quality-select">Recording Quality</label>
        <select id="quality-select" class="select-input">
          <option value="audio-only">Audio Only (Recommended)</option>
          <option value="720p">720p Video</option>
          <option value="1080p">1080p Video</option>
        </select>
      </div>

      <!-- Auto-start Toggle -->
      <div class="toggle-group">
        <label class="toggle-label">
          <input type="checkbox" id="auto-start-toggle" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text">Auto-start recording</span>
        </label>
      </div>

      <!-- Participant Tracking Toggle -->
      <div class="toggle-group">
        <label class="toggle-label">
          <input type="checkbox" id="participant-tracking-toggle" class="toggle-input" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-text">Track participant behavior</span>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" id="settings-link" class="footer-link">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
